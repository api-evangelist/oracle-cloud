specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Oracle Cloud Infrastructure
providerId: oracle-cloud
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Cloud Computing
  - Infrastructure as a Service
  - Platform as a Service
  - Oracle
  - Database
description: Oracle Cloud Infrastructure (OCI) is multi-product platform pricing — each service has its
  own per-OCPU/ECPU-hour, per-GB-month, or per-request rate. New tenancies receive a $300 / 30-day free
  trial credit; the Always Free tier offers a permanent allocation of compute, autonomous DB, storage,
  and load balancers at no cost. Universal Credits offer committed-use discounts of up to ~33% (1 year)
  or ~55% (3 year). BYOL (Bring Your Own License) reduces compute rates substantially for Oracle Database
  workloads. Elastic Pools can save up to 87% on Autonomous Database compute. Use the Oracle Cloud Cost
  Estimator for full per-service rates.
sources:
  - https://www.oracle.com/cloud/price-list/
  - https://www.oracle.com/cloud/free/
  - https://www.oracle.com/autonomous-database/pricing/
plans:
  - id: oracle-cloud-always-free
    name: Always Free
    type: freemium
    description: Permanent free allocation usable in any OCI tenancy.
    entries:
      - label: Compute (Arm Ampere A1)
        name: af_compute_arm
        type: flat
        metric: OCPU
        limit: 4
        timeFrame: usage
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Autonomous Database
        name: af_adb
        type: flat
        metric: instance
        limit: 2
        timeFrame: usage
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Block + Object Storage
        name: af_storage
        type: flat
        metric: GB
        limit: 200
        timeFrame: usage
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: 4 Arm Ampere A1 OCPUs (24 GB RAM total)
      - name: 2 Autonomous Databases (20 GB each)
      - name: 200 GB total block + object storage
      - name: 2 Load Balancers
      - name: Free outbound data transfer (10 TB/month)
  - id: oracle-cloud-trial
    name: Free Trial
    type: freemium
    description: $300 in credits valid for 30 days for any paid OCI service; downgrades to Always Free
      after expiration.
    entries:
      - label: Trial credits
        name: trial_credit
        type: flat
        metric: USD
        limit: 300
        timeFrame: usage
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: 30-day window
      - name: Access to all OCI services
  - id: oracle-cloud-payg
    name: Pay As You Go
    type: usage-based
    description: Per-service hourly / per-GB-month metered pricing. Common rates listed below; the full
      catalog lives in the OCI Cost Estimator.
    entries:
      - label: Autonomous DB OCPU (license-included)
        name: adb_ocpu_license
        type: metered
        metric: OCPU-hour
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: '0.336'
        userMultiplied: false
      - label: Autonomous DB OCPU (BYOL)
        name: adb_ocpu_byol
        type: metered
        metric: OCPU-hour
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: '0.0807'
        userMultiplied: false
      - label: Autonomous DB ECPU
        name: adb_ecpu
        type: metered
        metric: ECPU-hour
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: see https://www.oracle.com/autonomous-database/pricing/
        userMultiplied: false
      - label: Compute / Block storage / Object storage / Network
        name: oci_other
        type: metered
        metric: varies
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: see Oracle Cloud Cost Estimator
        userMultiplied: false
    elements:
      - name: No commitment
      - name: Per-second billing on most compute services
  - id: oracle-cloud-universal-credits
    name: Universal Credits (1- or 3-year)
    type: subscription
    description: Annual or 3-year committed-spend agreement that can be applied to any OCI service. Discounts
      typically scale with commitment size and term.
    entries:
      - label: Annual commitment
        name: annual_commit
        type: subscription
        metric: USD-year
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: contact sales (committed discount)
        userMultiplied: false
    elements:
      - name: Committed-use discount
      - name: Applies across all OCI services
  - id: oracle-cloud-byol
    name: Bring Your Own License (BYOL)
    type: usage-based
    description: Reuse existing on-prem Oracle licenses to pay only the OCI infrastructure rate (e.g.
      Autonomous DB BYOL drops OCPU from $0.336 to $0.0807).
    entries:
      - label: Autonomous DB BYOL
        name: byol_adb
        type: metered
        metric: OCPU-hour
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: '0.0807'
        userMultiplied: false
    elements:
      - name: Up to ~76% off license-included rate (Autonomous DB)
      - name: Available across most Oracle PaaS services
  - id: oracle-cloud-elastic-pools
    name: Elastic Pools
    type: usage-based
    description: Consolidate Autonomous Databases into a shared compute pool for up to ~87% reduction
      in Autonomous DB compute cost.
    entries:
      - label: Pooled ECPU
        name: pool_ecpu
        type: metered
        metric: ECPU-hour
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: up to 87% off list
        userMultiplied: false
    elements:
      - name: Pooled compute across multiple ADBs
      - name: Significant cost savings at scale
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
