info:
  title: Oracle Cloud Object Storage API
  description: Store and retrieve large amounts of unstructured data in Oracle Cloud Infrastructure Object Storage.
  version: '20160918'
  x-generated-from: documentation
  x-last-validated: '2026-04-18'
  contact:
