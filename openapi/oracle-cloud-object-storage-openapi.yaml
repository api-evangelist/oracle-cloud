components:
  securitySchemes:
    ociSignature:
      type: http
      scheme: bearer
      description: OCI request signature authentication using API signing keys.
  schemas:
    BucketSummary:
      type: object
      description: Summary information about a bucket.
      properties:
        namespace:
          type: string
          description: The Object Storage namespace.
          example: my-namespace
        name:
          type: string
          description: The name of the bucket.
          example: my-bucket
        compartmentId:
          type: string
          description: The OCID of the compartment.
          example: ocid1.compartment.oc1..abcdefg123456
        createdBy:
          type: string
          description: The OCID of the user who created the bucket.
          example: example-value
        timeCreated:
          type: string
          format: date-time
          description: The date and time the bucket was created.
          example: '2026-01-15T10:30:00Z'
        etag:
          type: string
          description: The entity tag (ETag) for the bucket.
          example: example-value
    Bucket:
      type: object
      description: A bucket is a container for storing objects in Object Storage.
      properties:
        namespace:
          type: string
          description: The Object Storage namespace.
          example: my-namespace
        name:
          type: string
          description: The name of the bucket.
          example: my-bucket
        compartmentId:
          type: string
          description: The OCID of the compartment.
          example: ocid1.compartment.oc1..abcdefg123456
        createdBy:
          type: string
          description: The OCID of the user who created the bucket.
          example: example-value
        timeCreated:
          type: string
          format: date-time
          description: The date and time the bucket was created.
          example: '2026-04-18T10:30:00Z'
        publicAccessType:
          type: string
          description: The type of public access enabled on this bucket.
          enum:
          - NoPublicAccess
          - ObjectRead
          - ObjectReadWithoutList
          example: NoPublicAccess
        storageTier:
          type: string
          description: The storage tier type.
          enum:
          - Standard
          - Archive
          example: Standard
        objectEventsEnabled:
          type: boolean
          description: Whether events are emitted for object state changes.
          example: false
        freeformTags:
          type: object
          additionalProperties:
            type: string
          example: *id001
        definedTags:
          type: object
          additionalProperties:
            type: object
          example: *id002
        objectLifecyclePolicyEtag:
          type: string
          description: The entity tag for the object lifecycle policy.
          example: example-value
        approximateCount:
          type: integer
          description: Approximate number of objects in the bucket.
          example: 1500
        approximateSize:
          type: integer
          description: Approximate total size in bytes.
          example: 1073741824
        versioning:
          type: string
          description: The versioning status of the bucket.
          enum:
          - Enabled
          - Suspended
          - Disabled
          example: Enabled
    CreateBucketDetails:
      type: object
      description: Details for creating a new bucket.
      required:
      - name
      - compartmentId
      properties:
        name:
          type: string
          description: The name of the bucket.
          example: my-new-bucket
        compartmentId:
          type: string
          description: The OCID of the compartment.
          example: ocid1.compartment.oc1..abcdefg123456
        publicAccessType:
          type: string
          description: The public access type.
          enum:
          - NoPublicAccess
          - ObjectRead
          - ObjectReadWithoutList
          default: NoPublicAccess
          example: NoPublicAccess
        storageTier:
          type: string
          description: The storage tier type.
          enum:
          - Standard
          - Archive
          default: Standard
          example: Standard
        objectEventsEnabled:
          type: boolean
          description: Whether events are emitted for object state changes.
          default: false
          example: false
        versioning:
          type: string
          description: The versioning status.
          enum:
          - Enabled
          - Disabled
          example: Enabled
        freeformTags:
          type: object
          additionalProperties:
            type: string
          example: *id003
    UpdateBucketDetails:
      type: object
      description: Details for updating a bucket.
      properties:
        name:
          type: string
          description: The name of the bucket.
          example: example-value
        namespace:
          type: string
          description: The Object Storage namespace.
          example: oci_computeagent
        compartmentId:
          type: string
          description: The OCID of the compartment.
          example: ocid1.resource.oc1.iad.abcdefg123456
        publicAccessType:
          type: string
          enum:
          - NoPublicAccess
          - ObjectRead
          - ObjectReadWithoutList
          example: NoPublicAccess
        objectEventsEnabled:
          type: boolean
          example: true
        versioning:
          type: string
          enum:
          - Enabled
          - Suspended
          example: Enabled
        freeformTags:
          type: object
          additionalProperties:
            type: string
          example: *id004
    ListObjects:
      type: object
      description: Response containing a list of objects.
      properties:
        objects:
          type: array
          description: List of object summaries.
          items:
            $ref: '#/components/schemas/ObjectSummary'
          example: *id005
        prefixes:
          type: array
          description: Prefixes for pseudo-directory grouping.
          items:
            type: string
          example: *id006
        nextStartWith:
          type: string
          description: Object name to resume listing.
          example: example-value
    ObjectSummary:
      type: object
      description: Summary of an object in a bucket.
      properties:
        name:
          type: string
          description: The name of the object.
          example: documents/report.pdf
        size:
          type: integer
          description: Size of the object in bytes.
          example: 1048576
        md5:
          type: string
          description: Base64-encoded MD5 hash.
          example: aGVsbG93b3JsZA==
        timeCreated:
          type: string
          format: date-time
          description: The date and time the object was created.
          example: '2026-04-18T10:30:00Z'
        timeModified:
          type: string
          format: date-time
          description: The date and time the object was last modified.
          example: '2026-04-18T10:30:00Z'
        storageTier:
          type: string
          description: The storage tier of the object.
          enum:
          - Standard
          - InfrequentAccess
          - Archive
          example: Standard
    PreauthenticatedRequestSummary:
      type: object
      description: Summary of a preauthenticated request.
      properties:
        id:
          type: string
          description: The unique identifier.
          example: ocid1.resource.oc1.iad.abcdefg123456
        name:
          type: string
          description: The user-provided name.
          example: example-value
        objectName:
          type: string
          description: The name of the object.
          example: example-value
        accessType:
          type: string
          description: The operation that can be performed.
          enum:
          - ObjectRead
          - ObjectWrite
          - ObjectReadWrite
          - AnyObjectRead
          - AnyObjectWrite
          - AnyObjectReadWrite
          example: ObjectRead
