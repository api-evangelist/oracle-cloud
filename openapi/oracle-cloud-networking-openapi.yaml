components:
  securitySchemes:
    ociSignature:
      type: http
      scheme: bearer
      description: OCI request signature authentication.
  schemas:
    Vcn:
      type: object
      description: A virtual cloud network in Oracle Cloud Infrastructure.
      properties:
        id:
          type: string
          description: The OCID of the VCN.
          example: ocid1.vcn.oc1.iad.abcdefg123456
        compartmentId:
          type: string
          description: The OCID of the compartment.
          example: ocid1.resource.oc1.iad.abcdefg123456
        displayName:
          type: string
          description: A user-friendly name.
          example: my-vcn
        cidrBlock:
          type: string
          description: The CIDR block of the VCN.
          example: 10.0.0.0/16
        cidrBlocks:
          type: array
          items:
            type: string
          description: List of CIDR blocks.
          example: *id001
        defaultDhcpOptionsId:
          type: string
          description: The OCID of the default DHCP options.
          example: ocid1.resource.oc1.iad.abcdefg123456
        defaultRouteTableId:
          type: string
          description: The OCID of the default route table.
          example: ocid1.resource.oc1.iad.abcdefg123456
        defaultSecurityListId:
          type: string
          description: The OCID of the default security list.
          example: ocid1.resource.oc1.iad.abcdefg123456
        dnsLabel:
          type: string
          description: The DNS label for the VCN.
          example: myvcn
        lifecycleState:
          type: string
          enum:
          - PROVISIONING
          - AVAILABLE
          - TERMINATING
          - TERMINATED
          example: PROVISIONING
        timeCreated:
          type: string
          format: date-time
          example: '2026-04-18T10:30:00Z'
        freeformTags:
          type: object
          additionalProperties:
            type: string
          example: *id002
    CreateVcnDetails:
      type: object
      required:
      - compartmentId
      - cidrBlocks
      properties:
        compartmentId:
          type: string
          description: The OCID of the compartment.
          example: ocid1.resource.oc1.iad.abcdefg123456
        cidrBlocks:
          type: array
          items:
            type: string
          description: List of CIDR blocks for the VCN.
          example: *id004
        displayName:
          type: string
          description: A user-friendly name.
          example: my-vcn
        dnsLabel:
          type: string
          description: DNS label for the VCN.
          example: myvcn
        freeformTags:
          type: object
          additionalProperties:
            type: string
          example: *id005
    UpdateVcnDetails:
      type: object
      properties:
        displayName:
          type: string
          example: my-resource
        freeformTags:
          type: object
          additionalProperties:
            type: string
          example: *id006
    Subnet:
      type: object
      description: A subnet in a virtual cloud network.
      properties:
        id:
          type: string
          description: The OCID of the subnet.
          example: ocid1.subnet.oc1.iad.abcdefg123456
        compartmentId:
          type: string
          example: ocid1.resource.oc1.iad.abcdefg123456
        vcnId:
          type: string
          description: The OCID of the VCN.
          example: ocid1.resource.oc1.iad.abcdefg123456
        displayName:
          type: string
          example: public-subnet-1
        cidrBlock:
          type: string
          description: The CIDR block of the subnet.
          example: 10.0.0.0/24
        availabilityDomain:
          type: string
          description: The availability domain.
          example: Uocm:US-ASHBURN-AD-1
        dnsLabel:
          type: string
          example: myresource
        prohibitPublicIpOnVnic:
          type: boolean
          description: Whether VNICs can have public IPs.
          example: true
        routeTableId:
          type: string
          example: ocid1.resource.oc1.iad.abcdefg123456
        securityListIds:
          type: array
          items:
            type: string
          example: *id003
        lifecycleState:
          type: string
          enum:
          - PROVISIONING
          - AVAILABLE
          - TERMINATING
          - TERMINATED
          example: PROVISIONING
        timeCreated:
          type: string
          format: date-time
          example: '2026-04-18T10:30:00Z'
    CreateSubnetDetails:
      type: object
      required:
      - compartmentId
      - vcnId
      - cidrBlock
      properties:
        compartmentId:
          type: string
          example: ocid1.resource.oc1.iad.abcdefg123456
