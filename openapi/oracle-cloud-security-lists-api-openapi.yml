paths:
  /securityLists:
    get:
      operationId: listSecurityLists
      summary: Oracle Cloud List Security Lists
      description: Lists the security lists in the specified VCN and compartment.
      tags:
      - Security Lists
      parameters:
      - name: compartmentId
        in: query
        required: true
        description: The OCID of the compartment.
        schema:
          type: string
        example: ocid1.resource.oc1.iad.abcdefg123456
      - name: vcnId
        in: query
        required: false
        description: The OCID of the VCN.
        schema:
          type: string
        example: ocid1.resource.oc1.iad.abcdefg123456
      responses:
        '200':
          description: Successfully retrieved security lists.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SecurityList'
              examples:
                ListSecurityLists200Example:
                  summary: Default listSecurityLists 200 response
                  x-microcks-default: true
                  value:
                  - id: ocid1.resource.oc1.iad.abcdefg123456
                    compartmentId: ocid1.resource.oc1.iad.abcdefg123456
                    vcnId: ocid1.resource.oc1.iad.abcdefg123456
                    displayName: Default Security List
                    lifecycleState: PROVISIONING
                    ingressSecurityRules:
                    - protocol: '6'
                      source: 0.0.0.0/0
                      isStateless: true
                    egressSecurityRules:
                    - protocol: example-value
                      destination: example-value
                      isStateless: true
                    timeCreated: '2026-04-18T10:30:00Z'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
components:
  schemas:
    SecurityList:
      type: object
      description: A set of firewall rules for a VCN subnet.
      properties:
        id:
          type: string
          example: ocid1.resource.oc1.iad.abcdefg123456
        compartmentId:
          type: string
          example: ocid1.resource.oc1.iad.abcdefg123456
        vcnId:
          type: string
          example: ocid1.resource.oc1.iad.abcdefg123456
        displayName:
          type: string
          example: Default Security List
        lifecycleState:
          type: string
          enum:
          - PROVISIONING
          - AVAILABLE
          - TERMINATING
          - TERMINATED
          example: PROVISIONING
        ingressSecurityRules:
          type: array
          items:
            type: object
            properties:
              protocol:
                type: string
                example: '6'
              source:
                type: string
                example: 0.0.0.0/0
              isStateless:
                type: boolean
          example:
          - protocol: '6'
            source: 0.0.0.0/0
            isStateless: true
        egressSecurityRules:
          type: array
          items:
            type: object
            properties:
              protocol:
                type: string
              destination:
                type: string
              isStateless:
                type: boolean
          example:
          - protocol: example-value
            destination: example-value
            isStateless: true
        timeCreated:
          type: string
          format: date-time
          example: '2026-04-18T10:30:00Z'
  securitySchemes:
    ociSignature:
      type: http
      scheme: bearer
      description: OCI request signature authentication using API signing keys.
