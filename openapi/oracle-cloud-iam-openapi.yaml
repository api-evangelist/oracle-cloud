components:
  securitySchemes:
    ociSignature:
      type: http
      scheme: bearer
      description: OCI request signature authentication.
  schemas:
    User:
      type: object
      description: An IAM user in Oracle Cloud Infrastructure.
      properties:
        id:
          type: string
          description: The OCID of the user.
          example: ocid1.user.oc1..abcdefg123456
        compartmentId:
          type: string
          description: The OCID of the tenancy.
          example: ocid1.resource.oc1.iad.abcdefg123456
        name:
          type: string
          description: The name of the user.
          example: jsmith@example.com
        description:
          type: string
          description: The description of the user.
          example: John Smith
        email:
          type: string
          format: email
          description: The email address.
          example: jsmith@example.com
        lifecycleState:
          type: string
          enum:
          - CREATING
          - ACTIVE
          - INACTIVE
          - DELETING
          - DELETED
          example: CREATING
        isMfaActivated:
          type: boolean
          description: Whether MFA is activated.
          example: true
        timeCreated:
          type: string
          format: date-time
          example: '2026-04-18T10:30:00Z'
    CreateUserDetails:
      type: object
      required:
      - compartmentId
      - name
      - description
      properties:
        compartmentId:
          type: string
          example: ocid1.resource.oc1.iad.abcdefg123456
        name:
          type: string
          example: jsmith@example.com
        description:
          type: string
          example: John Smith
        email:
          type: string
          format: email
          example: admin@example.com
    UpdateUserDetails:
      type: object
      properties:
        description:
          type: string
          example: example-value
        email:
          type: string
          format: email
          example: admin@example.com
    Group:
      type: object
      description: An IAM group.
      properties:
        id:
          type: string
          example: ocid1.resource.oc1.iad.abcdefg123456
        compartmentId:
          type: string
          example: ocid1.resource.oc1.iad.abcdefg123456
        name:
          type: string
          example: Administrators
        description:
          type: string
          example: example-value
        lifecycleState:
          type: string
          enum:
          - CREATING
          - ACTIVE
          - INACTIVE
          - DELETING
          - DELETED
          example: CREATING
        timeCreated:
          type: string
          format: date-time
          example: '2026-04-18T10:30:00Z'
    CreateGroupDetails:
      type: object
      required:
      - compartmentId
      - name
      - description
      properties:
        compartmentId:
          type: string
          example: ocid1.resource.oc1.iad.abcdefg123456
        name:
          type: string
          example: example-value
        description:
          type: string
          example: example-value
    Policy:
      type: object
      description: An IAM policy with authorization statements.
      properties:
        id:
          type: string
          example: ocid1.resource.oc1.iad.abcdefg123456
        compartmentId:
          type: string
          example: ocid1.resource.oc1.iad.abcdefg123456
        name:
          type: string
          example: AllowAdmins
        description:
          type: string
          example: example-value
        statements:
          type: array
          items:
            type: string
          example: *id001
        lifecycleState:
          type: string
          enum:
          - CREATING
          - ACTIVE
          - INACTIVE
          - DELETING
          - DELETED
          example: CREATING
        timeCreated:
          type: string
          format: date-time
          example: '2026-04-18T10:30:00Z'
    CreatePolicyDetails:
      type: object
      required:
      - compartmentId
      - name
      - description
      - statements
      properties:
        compartmentId:
          type: string
          example: ocid1.resource.oc1.iad.abcdefg123456
        name:
          type: string
          example: example-value
        description:
          type: string
          example: example-value
        statements:
          type: array
          items:
            type: string
          example: *id002
    Compartment:
      type: object
      description: A compartment for organizing cloud resources.
      properties:
        id:
          type: string
          example: ocid1.resource.oc1.iad.abcdefg123456
        compartmentId:
          type: string
          example: ocid1.resource.oc1.iad.abcdefg123456
        name:
          type: string
          example: my-compartment
        description:
          type: string
          example: example-value
        lifecycleState:
          type: string
          enum:
          - CREATING
          - ACTIVE
          - INACTIVE
          - DELETING
          - DELETED
          example: CREATING
        timeCreated:
          type: string
          format: date-time
          example: '2026-04-18T10:30:00Z'
    Error:
      type: object
      properties:
        code:
          type: string
          example: example-value
        message:
          type: string
          example: example-value
        status:
          type: integer
