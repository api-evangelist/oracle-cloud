components:
  schemas:
    Cluster:
      type: object
      description: A Kubernetes cluster managed by OKE.
      properties:
        id:
          type: string
          description: The OCID of the cluster.
          example: ocid1.cluster.oc1.iad.abcdefg123456
        compartmentId:
          type: string
          example: ocid1.resource.oc1.iad.abcdefg123456
        name:
          type: string
          example: my-cluster
        kubernetesVersion:
          type: string
          example: v1.28.2
        vcnId:
          type: string
          example: ocid1.resource.oc1.iad.abcdefg123456
        lifecycleState:
          type: string
          enum:
