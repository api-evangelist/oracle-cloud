paths:
  /n/{namespaceName}/b/{bucketName}/o:
    get:
      operationId: listObjects
      summary: Oracle Cloud List Objects
      description: Lists the objects in the specified bucket.
      tags:
      - Objects
      parameters:
      - name: namespaceName
        in: path
        required: true
        description: The Object Storage namespace.
        schema:
          type: string
        example: oci_computeagent
      - name: bucketName
        in: path
        required: true
        description: The name of the bucket.
        schema:
          type: string
        example: example-value
      - name: prefix
        in: query
        required: false
        description: Filter objects whose name begins with this prefix.
        schema:
          type: string
        example: example-value
      - name: delimiter
        in: query
        required: false
        description: Delimiter for pseudo-directory grouping.
        schema:
          type: string
        example: example-value
      - name: limit
        in: query
        required: false
        description: Maximum number of items to return.
        schema:
          type: integer
        example: 1
      - name: start
        in: query
        required: false
        description: Object name to start listing from.
        schema:
          type: string
        example: example-value
      responses:
        '200':
          description: Successfully retrieved list of objects.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListObjects'
              examples:
                ListObjects200Example:
                  summary: Default listObjects 200 response
                  x-microcks-default: true
                  value:
                    objects:
                    - name: documents/report.pdf
                      size: 1048576
                      md5: aGVsbG93b3JsZA==
                      timeCreated: '2026-04-18T10:30:00Z'
                      timeModified: '2026-04-18T10:30:00Z'
                      storageTier: Standard
                    prefixes:
                    - example-value
                    nextStartWith: example-value
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /n/{namespaceName}/b/{bucketName}/o/{objectName}:
    get:
      operationId: getObject
      summary: Oracle Cloud Get Object
      description: Gets the metadata and body of an object.
      tags:
      - Objects
      parameters:
      - name: namespaceName
        in: path
        required: true
        description: The Object Storage namespace.
        schema:
          type: string
        example: oci_computeagent
      - name: bucketName
        in: path
        required: true
        description: The name of the bucket.
        schema:
          type: string
        example: example-value
      - name: objectName
        in: path
        required: true
        description: The name of the object.
        schema:
          type: string
        example: example-value
      responses:
        '200':
          description: Successfully retrieved object.
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '404':
          description: Not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                GetObject404Example:
                  summary: Default getObject 404 response
                  x-microcks-default: true
                  value:
                    code: BucketNotFound
                    message: The bucket does not exist.
                    status: 404
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
    put:
      operationId: putObject
      summary: Oracle Cloud Put Object
      description: Creates a new object or overwrites an existing object.
      tags:
      - Objects
      parameters:
      - name: namespaceName
        in: path
        required: true
        description: The Object Storage namespace.
        schema:
          type: string
        example: oci_computeagent
      - name: bucketName
        in: path
        required: true
        description: The name of the bucket.
        schema:
          type: string
        example: example-value
      - name: objectName
        in: path
        required: true
        description: The name of the object.
        schema:
          type: string
        example: example-value
      - name: Content-Type
        in: header
        required: false
        description: The content type of the body.
        schema:
          type: string
        example: example-value
      - name: Content-Length
        in: header
        required: false
        description: The content length of the body.
        schema:
          type: integer
        example: 1
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        '200':
          description: Successfully uploaded object.
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
    delete:
      operationId: deleteObject
      summary: Oracle Cloud Delete Object
      description: Deletes an object.
      tags:
      - Objects
      parameters:
      - name: namespaceName
        in: path
        required: true
        description: The Object Storage namespace.
        schema:
          type: string
