          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                DeleteObject404Example:
                  summary: Default deleteObject 404 response
                  x-microcks-default: true
                  value:
                    code: BucketNotFound
                    message: The bucket does not exist.
                    status: 404
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
components:
  schemas:
    ObjectSummary:
      type: object
      description: Summary of an object in a bucket.
      properties:
        name:
          type: string
          description: The name of the object.
          example: documents/report.pdf
        size:
          type: integer
          description: Size of the object in bytes.
          example: 1048576
        md5:
          type: string
          description: Base64-encoded MD5 hash.
          example: aGVsbG93b3JsZA==
        timeCreated:
          type: string
          format: date-time
          description: The date and time the object was created.
          example: '2026-04-18T10:30:00Z'
        timeModified:
          type: string
          format: date-time
          description: The date and time the object was last modified.
          example: '2026-04-18T10:30:00Z'
        storageTier:
          type: string
          description: The storage tier of the object.
          enum:
          - Standard
          - InfrequentAccess
          - Archive
          example: Standard
    Error:
      type: object
      description: Error response from OCI API.
      properties:
        code:
          type: string
          description: A short error code.
          example: BucketNotFound
        message:
          type: string
          description: A human-readable error message.
          example: The bucket does not exist.
        status:
          type: integer
          description: HTTP status code.
          example: 404
    ListObjects:
      type: object
      description: Response containing a list of objects.
      properties:
        objects:
          type: array
          description: List of object summaries.
          items:
            $ref: '#/components/schemas/ObjectSummary'
          example:
          - name: documents/report.pdf
            size: 1048576
            md5: aGVsbG93b3JsZA==
            timeCreated: '2026-04-18T10:30:00Z'
            timeModified: '2026-04-18T10:30:00Z'
            storageTier: Standard
        prefixes:
          type: array
          description: Prefixes for pseudo-directory grouping.
          items:
            type: string
          example:
          - example-value
        nextStartWith:
          type: string
          description: Object name to resume listing.
          example: example-value
  securitySchemes:
    ociSignature:
      type: http
      scheme: bearer
      description: OCI request signature authentication using API signing keys.
