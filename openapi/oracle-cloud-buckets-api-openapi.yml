    get:
      operationId: listBuckets
      summary: Oracle Cloud List Buckets
      description: Gets a list of all BucketSummary items in a compartment.
      tags:
      - Buckets
      parameters:
      - name: namespaceName
        in: path
        required: true
        description: The Object Storage namespace.
        schema:
          type: string
        example: oci_computeagent
      - name: compartmentId
        in: query
        required: true
        description: The OCID of the compartment.
        schema:
          type: string
        example: ocid1.resource.oc1.iad.abcdefg123456
      - name: limit
        in: query
        required: false
        description: Maximum number of items to return.
        schema:
          type: integer
        example: 1
      - name: page
        in: query
        required: false
        description: Pagination token.
        schema:
          type: string
        example: example-value
      responses:
        '200':
          description: Successfully retrieved list of buckets.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BucketSummary'
              examples:
                ListBuckets200Example:
                  summary: Default listBuckets 200 response
                  x-microcks-default: true
                  value:
                  - namespace: my-namespace
                    name: my-bucket
                    compartmentId: ocid1.compartment.oc1..abcdefg123456
                    createdBy: example-value
                    timeCreated: '2026-01-15T10:30:00Z'
                    etag: example-value
        '400':
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                ListBuckets400Example:
                  summary: Default listBuckets 400 response
                  x-microcks-default: true
                  value:
                    code: BucketNotFound
                    message: The bucket does not exist.
                    status: 404
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                ListBuckets401Example:
                  summary: Default listBuckets 401 response
                  x-microcks-default: true
                  value:
                    code: BucketNotFound
                    message: The bucket does not exist.
                    status: 404
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
