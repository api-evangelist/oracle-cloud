servers:
- url: https://iaas.{region}.oraclecloud.com/20160918
  description: OCI Compute API server
  variables:
    region:
      default: us-ashburn-1
      description: OCI region identifier
security:
- ociSignature: []
tags:
- name: Route Tables
paths:
  /routeTables:
    get:
      operationId: listRouteTables
      summary: Oracle Cloud List Route Tables
      description: Lists the route tables in the specified VCN and compartment.
      tags:
      - Route Tables
      parameters:
      - name: compartmentId
        in: query
        required: true
        description: The OCID of the compartment.
        schema:
          type: string
        example: ocid1.resource.oc1.iad.abcdefg123456
      - name: vcnId
        in: query
        required: false
        description: The OCID of the VCN.
        schema:
          type: string
        example: ocid1.resource.oc1.iad.abcdefg123456
      responses:
        '200':
          description: Successfully retrieved route tables.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RouteTable'
              examples:
                ListRouteTables200Example:
                  summary: Default listRouteTables 200 response
                  x-microcks-default: true
                  value:
                  - id: ocid1.resource.oc1.iad.abcdefg123456
                    compartmentId: ocid1.resource.oc1.iad.abcdefg123456
                    vcnId: ocid1.resource.oc1.iad.abcdefg123456
                    displayName: Default Route Table
                    lifecycleState: PROVISIONING
                    routeRules:
                    - destination: 0.0.0.0/0
                      destinationType: CIDR_BLOCK
                      networkEntityId: ocid1.resource.oc1.iad.abcdefg123456
                    timeCreated: '2026-04-18T10:30:00Z'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
components:
  schemas:
    RouteTable:
      type: object
      description: A route table for a VCN.
      properties:
        id:
          type: string
          example: ocid1.resource.oc1.iad.abcdefg123456
        compartmentId:
          type: string
          example: ocid1.resource.oc1.iad.abcdefg123456
        vcnId:
          type: string
          example: ocid1.resource.oc1.iad.abcdefg123456
        displayName:
          type: string
          example: Default Route Table
        lifecycleState:
          type: string
          enum:
          - PROVISIONING
          - AVAILABLE
          - TERMINATING
          - TERMINATED
          example: PROVISIONING
        routeRules:
          type: array
          items:
            type: object
            properties:
              destination:
                type: string
                example: 0.0.0.0/0
              destinationType:
                type: string
                enum:
                - CIDR_BLOCK
                - SERVICE_CIDR_BLOCK
              networkEntityId:
                type: string
          example:
          - destination: 0.0.0.0/0
            destinationType: CIDR_BLOCK
            networkEntityId: ocid1.resource.oc1.iad.abcdefg123456
        timeCreated:
          type: string
          format: date-time
          example: '2026-04-18T10:30:00Z'
  securitySchemes:
    ociSignature:
      type: http
      scheme: bearer
      description: OCI request signature authentication using API signing keys.
