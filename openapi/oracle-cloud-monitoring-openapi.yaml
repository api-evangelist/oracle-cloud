  /alarms:
    get:
      operationId: listAlarms
      summary: Oracle Cloud List Alarms
      description: Lists the alarms in the specified compartment.
      tags:
      - Alarms
      parameters:
      - name: compartmentId
        in: query
        required: true
        description: The OCID of the compartment.
        schema:
