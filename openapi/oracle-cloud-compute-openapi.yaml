components:
  securitySchemes:
    ociSignature:
      type: http
      scheme: bearer
      description: OCI request signature authentication using API signing keys.
  schemas:
    Instance:
      type: object
      description: A compute instance running in Oracle Cloud Infrastructure.
      properties:
        id:
          type: string
          description: The OCID of the instance.
          example: ocid1.instance.oc1.iad.abcdefg123456
        compartmentId:
          type: string
          description: The OCID of the compartment.
          example: ocid1.compartment.oc1..abcdefg123456
        availabilityDomain:
          type: string
          description: The availability domain the instance is running in.
          example: Uocm:US-ASHBURN-AD-1
        displayName:
          type: string
          description: A user-friendly name.
          example: my-instance-01
        shape:
          type: string
          description: The shape of the instance.
          example: VM.Standard.E4.Flex
        lifecycleState:
          type: string
          description: The current state of the instance.
          enum:
          - PROVISIONING
          - RUNNING
          - STARTING
          - STOPPING
          - STOPPED
          - CREATING_IMAGE
          - TERMINATING
          - TERMINATED
          example: RUNNING
        region:
          type: string
          description: The region that contains the availability domain.
          example: us-ashburn-1
        imageId:
          type: string
          description: The OCID of the image used to boot the instance.
          example: ocid1.image.oc1.iad.abcdefg123456
        timeCreated:
          type: string
          format: date-time
          description: The date and time the instance was created.
          example: '2026-01-15T10:30:00Z'
        freeformTags:
          type: object
          description: Free-form tags for the instance.
          additionalProperties:
            type: string
          example: *id001
        definedTags:
          type: object
          description: Defined tags for the instance.
          additionalProperties:
            type: object
          example: *id002
    LaunchInstanceDetails:
      type: object
      description: Details for launching a new compute instance.
      required:
      - compartmentId
      - shape
      - availabilityDomain
      properties:
        compartmentId:
          type: string
          description: The OCID of the compartment.
          example: ocid1.compartment.oc1..abcdefg123456
        availabilityDomain:
          type: string
          description: The availability domain.
          example: Uocm:US-ASHBURN-AD-1
        shape:
          type: string
          description: The shape of the instance.
          example: VM.Standard.E4.Flex
        displayName:
          type: string
          description: A user-friendly name.
          example: my-new-instance
        imageId:
          type: string
          description: The OCID of the image to use.
          example: ocid1.image.oc1.iad.abcdefg123456
        subnetId:
          type: string
          description: The OCID of the subnet.
          example: ocid1.subnet.oc1.iad.abcdefg123456
        shapeConfig:
          type: object
          description: Configuration for flexible shapes.
          properties:
            ocpus:
              type: number
              description: The total number of OCPUs.
              example: 2.0
            memoryInGBs:
              type: number
              description: The total amount of memory in gigabytes.
              example: 16.0
          example: *id003
        freeformTags:
          type: object
          additionalProperties:
            type: string
          example: *id004
    UpdateInstanceDetails:
      type: object
      description: Details for updating an instance.
      properties:
        displayName:
          type: string
          description: A user-friendly name.
          example: updated-instance-name
        shape:
          type: string
          description: The shape of the instance.
          example: VM.Standard.E4.Flex
        shapeConfig:
          type: object
          properties:
            ocpus:
              type: number
              example: 4.0
            memoryInGBs:
              type: number
              example: 32.0
          example: *id005
        freeformTags:
          type: object
          additionalProperties:
            type: string
          example: *id006
    Image:
      type: object
      description: A boot disk image for launching compute instances.
      properties:
        id:
          type: string
          description: The OCID of the image.
          example: ocid1.image.oc1.iad.abcdefg123456
        compartmentId:
          type: string
          description: The OCID of the compartment.
          example: ocid1.resource.oc1.iad.abcdefg123456
        displayName:
          type: string
          description: A user-friendly name.
          example: Oracle-Linux-8.8-2026.01.01-0
        operatingSystem:
          type: string
          description: The image operating system.
          example: Oracle Linux
        operatingSystemVersion:
          type: string
          description: The image operating system version.
          example: '8.8'
        lifecycleState:
          type: string
          enum:
          - PROVISIONING
          - IMPORTING
          - AVAILABLE
          - EXPORTING
          - DISABLED
          - DELETED
          example: PROVISIONING
        sizeInMBs:
          type: integer
          description: Size of the image in megabytes.
          example: 47694
        timeCreated:
          type: string
          format: date-time
          example: '2026-04-18T10:30:00Z'
    Shape:
      type: object
      description: A compute shape defining the resources available for an instance.
      properties:
        shape:
          type: string
          description: The name of the shape.
          example: VM.Standard.E4.Flex
        processorDescription:
          type: string
          description: Description of the processor.
          example: 2.55 GHz AMD EPYC 7J13
        ocpus:
          type: number
          description: Default number of OCPUs.
          example: 1.0
        memoryInGBs:
          type: number
          description: Default amount of memory in gigabytes.
          example: 16.0
        gpus:
          type: integer
          description: Number of GPUs.
          example: 0
        networkingBandwidthInGbps:
          type: number
          description: Networking bandwidth in Gbps.
          example: 1.0
        isFlexible:
          type: boolean
          description: Whether the shape is flexible.
          example: true
    VolumeAttachment:
      type: object
      description: A volume attached to a compute instance.
      properties:
        id:
          type: string
          description: The OCID of the volume attachment.
          example: ocid1.resource.oc1.iad.abcdefg123456
        instanceId:
          type: string
          description: The OCID of the instance.
          example: ocid1.resource.oc1.iad.abcdefg123456
        volumeId:
          type: string
          description: The OCID of the volume.
          example: ocid1.resource.oc1.iad.abcdefg123456
        displayName:
          type: string
          description: A user-friendly name.
          example: my-resource
        lifecycleState:
          type: string
          enum:
          - ATTACHING
          - ATTACHED
          - DETACHING
          - DETACHED
          example: ATTACHING
        timeCreated:
          type: string
          format: date-time
          example: '2026-04-18T10:30:00Z'
        attachmentType:
          type: string
          description: The type of volume attachment.
          enum:
          - iscsi
          - paravirtualized
          example: iscsi
    AttachVolumeDetails:
      type: object
      description: Details for attaching a volume.
      required:
      - instanceId
      - volumeId
      - type
      properties:
        instanceId:
          type: string
          description: The OCID of the instance.
          example: ocid1.resource.oc1.iad.abcdefg123456
        volumeId:
          type: string
          description: The OCID of the volume.
          example: ocid1.resource.oc1.iad.abcdefg123456
        type:
          type: string
          description: The type of volume attachment.
          enum:
          - iscsi
          - paravirtualized
          example: iscsi
        displayName:
          type: string
          description: A user-friendly name.
          example: my-resource
        isReadOnly:
          type: boolean
          description: Whether the attachment is read-only.
          default: false
          example: false
    Error:
      type: object
      description: Error response from OCI API.
      properties:
        code:
          type: string
          description: A short error code.
          example: NotAuthorizedOrNotFound
        message:
          type: string
          description: A human-readable error message.
          example: Authorization failed or requested resource not found.
        status:
          type: integer
          description: HTTP status code.
          example: 404
security:
- ociSignature: []
