description: 'FOCUS-aligned FinOps for Oracle Cloud Infrastructure: per-service pay-as-you-go (compute
  OCPU/ECPU-hour, storage GB-month, network egress, autonomous DB) plus committed-use Universal Credits
  (1- or 3-year) and BYOL discounts. Always Free tier provides perpetual allocation. Cost data accessible
  via Cost Analysis, Usage Reports (CSV / Object Storage), and the FOCUS Cost and Usage exports.'
