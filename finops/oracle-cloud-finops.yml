meters:
  - name: compute_ocpu_hours
    unit: OCPU-hour
    aggregation: sum
    dimensions:
      - shape
      - region
      - tenancy
      - compartment
  - name: ecpu_hours
    unit: ECPU-hour
    aggregation: sum
    dimensions:
      - service
      - region
      - autonomous_db
  - name: block_storage
    unit: GB-month
    aggregation: sum
    dimensions:
      - region
      - performance_tier
  - name: object_storage
    unit: GB-month
    aggregation: sum
    dimensions:
      - region
      - storage_tier
  - name: data_egress
    unit: GB
    aggregation: sum
    dimensions:
      - region
      - destination
  - name: load_balancer_hours
    unit: shape-hour
    aggregation: sum
    dimensions:
      - shape
      - region
  - name: database_storage
    unit: GB-month
    aggregation: sum
    dimensions:
      - autonomous_db
      - region
principles:
  - name: Visibility
    description: Use OCI Cost Analysis, scheduled Usage Reports to Object Storage (CSV), and the FOCUS
      Cost and Usage export to attribute spend to compartments and tags in near real-time.
  - name: Allocation
    description: Tag every resource with cost-center / environment / app metadata; use OCI compartments
      as the primary allocation boundary and tag-based budgets to alert per group.
  - name: Optimization
    description: Convert sustained workloads to Universal Credits (1y / 3y commitment); apply BYOL on
      Oracle Database / WebLogic for ~70%+ savings; consolidate Autonomous Databases into Elastic Pools
      (up to ~87% off); right-size to Arm Ampere A1 shapes where workloads permit; clean up unattached
      block volumes and orphaned reserved IPs.
  - name: Accountability
    description: Cloud / platform team owns the OCI tenancy invoice; compartment owners review monthly
      Cost Analysis reports and respond to budget alerts. Use OCI Quotas to enforce hard caps on optional
      services.
maintainers:
