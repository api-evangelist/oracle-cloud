naftiko: 1.0.0-alpha2
info:
  label: Oracle Cloud Container Engine for Kubernetes API — Clusters
  description: 'Oracle Cloud Container Engine for Kubernetes API — Clusters. 5 operations. Lead operation: Oracle Cloud List
    Clusters. Self-contained Naftiko capability covering one Oracle Cloud business surface.'
  tags:
  - Oracle Cloud
  - Clusters
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ORACLE_CLOUD_API_KEY: ORACLE_CLOUD_API_KEY
capability:
  consumes:
  - type: http
    namespace: oke-clusters
    baseUri: https://containerengine.{region}.oraclecloud.com/20180222
    description: Oracle Cloud Container Engine for Kubernetes API — Clusters business capability. Self-contained, no shared
      references.
    resources:
    - name: clusters
      path: /clusters
      operations:
      - name: listclusters
        method: GET
        description: Oracle Cloud List Clusters
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: compartmentId
          in: query
          type: string
          description: The OCID of the compartment.
          required: true
      - name: createcluster
        method: POST
        description: Oracle Cloud Create Cluster
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: clusters-clusterId
      path: /clusters/{clusterId}
      operations:
      - name: getcluster
        method: GET
        description: Oracle Cloud Get Cluster
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: clusterId
          in: path
          type: string
          description: The OCID of the cluster.
          required: true
      - name: updatecluster
        method: PUT
        description: Oracle Cloud Update Cluster
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: clusterId
          in: path
          type: string
          description: The OCID of the cluster.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletecluster
        method: DELETE
        description: Oracle Cloud Delete Cluster
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: clusterId
          in: path
          type: string
          description: The OCID of the cluster.
          required: true
    authentication:
      type: bearer
      token: '{{env.ORACLE_CLOUD_API_KEY}}'
  exposes:
  - type: rest
    namespace: oke-clusters-rest
    port: 8080
    description: REST adapter for Oracle Cloud Container Engine for Kubernetes API — Clusters. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/clusters
      name: clusters
      description: REST surface for clusters.
      operations:
      - method: GET
        name: listclusters
        description: Oracle Cloud List Clusters
        call: oke-clusters.listclusters
        with:
          compartmentId: rest.compartmentId
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createcluster
        description: Oracle Cloud Create Cluster
        call: oke-clusters.createcluster
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/clusters/{clusterid}
      name: clusters-clusterid
      description: REST surface for clusters-clusterId.
      operations:
      - method: GET
        name: getcluster
        description: Oracle Cloud Get Cluster
        call: oke-clusters.getcluster
        with:
          clusterId: rest.clusterId
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updatecluster
        description: Oracle Cloud Update Cluster
        call: oke-clusters.updatecluster
        with:
          clusterId: rest.clusterId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletecluster
        description: Oracle Cloud Delete Cluster
        call: oke-clusters.deletecluster
        with:
          clusterId: rest.clusterId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
