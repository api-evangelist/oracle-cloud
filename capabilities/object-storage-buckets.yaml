naftiko: 1.0.0-alpha2
info:
  label: Oracle Cloud Object Storage API — Buckets
  description: 'Oracle Cloud Object Storage API — Buckets. 5 operations. Lead operation: Oracle Cloud List Buckets. Self-contained
    Naftiko capability covering one Oracle Cloud business surface.'
  tags:
  - Oracle Cloud
  - Buckets
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ORACLE_CLOUD_API_KEY: ORACLE_CLOUD_API_KEY
capability:
  consumes:
  - type: http
    namespace: object-storage-buckets
    baseUri: https://objectstorage.{region}.oraclecloud.com
    description: Oracle Cloud Object Storage API — Buckets business capability. Self-contained, no shared references.
    resources:
    - name: n-namespaceName-b
      path: /n/{namespaceName}/b
      operations:
      - name: listbuckets
        method: GET
        description: Oracle Cloud List Buckets
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: namespaceName
          in: path
          type: string
          description: The Object Storage namespace.
          required: true
        - name: compartmentId
          in: query
          type: string
          description: The OCID of the compartment.
          required: true
        - name: limit
          in: query
          type: integer
          description: Maximum number of items to return.
        - name: page
          in: query
          type: string
          description: Pagination token.
      - name: createbucket
        method: POST
        description: Oracle Cloud Create Bucket
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: namespaceName
          in: path
          type: string
          description: The Object Storage namespace.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: n-namespaceName-b-bucketName
      path: /n/{namespaceName}/b/{bucketName}
      operations:
      - name: getbucket
        method: GET
        description: Oracle Cloud Get Bucket
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: namespaceName
          in: path
          type: string
          description: The Object Storage namespace.
          required: true
        - name: bucketName
          in: path
          type: string
          description: The name of the bucket.
          required: true
      - name: updatebucket
        method: PUT
        description: Oracle Cloud Update Bucket
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: namespaceName
          in: path
          type: string
          description: The Object Storage namespace.
          required: true
        - name: bucketName
          in: path
          type: string
          description: The name of the bucket.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletebucket
        method: DELETE
        description: Oracle Cloud Delete Bucket
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: namespaceName
          in: path
          type: string
          description: The Object Storage namespace.
          required: true
        - name: bucketName
          in: path
          type: string
          description: The name of the bucket.
          required: true
    authentication:
      type: bearer
      token: '{{env.ORACLE_CLOUD_API_KEY}}'
  exposes:
  - type: rest
    namespace: object-storage-buckets-rest
    port: 8080
    description: REST adapter for Oracle Cloud Object Storage API — Buckets. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/n/{namespacename}/b
      name: n-namespacename-b
      description: REST surface for n-namespaceName-b.
      operations:
      - method: GET
        name: listbuckets
        description: Oracle Cloud List Buckets
        call: object-storage-buckets.listbuckets
        with:
          namespaceName: rest.namespaceName
          compartmentId: rest.compartmentId
          limit: rest.limit
          page: rest.page
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createbucket
        description: Oracle Cloud Create Bucket
        call: object-storage-buckets.createbucket
        with:
          namespaceName: rest.namespaceName
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/n/{namespacename}/b/{bucketname}
      name: n-namespacename-b-bucketname
      description: REST surface for n-namespaceName-b-bucketName.
      operations:
      - method: GET
        name: getbucket
        description: Oracle Cloud Get Bucket
        call: object-storage-buckets.getbucket
        with:
          namespaceName: rest.namespaceName
          bucketName: rest.bucketName
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updatebucket
        description: Oracle Cloud Update Bucket
        call: object-storage-buckets.updatebucket
        with:
          namespaceName: rest.namespaceName
          bucketName: rest.bucketName
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletebucket
        description: Oracle Cloud Delete Bucket
        call: object-storage-buckets.deletebucket
        with:
          namespaceName: rest.namespaceName
          bucketName: rest.bucketName
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: object-storage-buckets-mcp
    port: 9090
    transport: http
    description: MCP adapter for Oracle Cloud Object Storage API — Buckets. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: oracle-cloud-list-buckets
      description: Oracle Cloud List Buckets
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: object-storage-buckets.listbuckets
      with:
        namespaceName: tools.namespaceName
        compartmentId: tools.compartmentId
        limit: tools.limit
        page: tools.page
      outputParameters:
      - type: object
        mapping: $.
    - name: oracle-cloud-create-bucket
      description: Oracle Cloud Create Bucket
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: object-storage-buckets.createbucket
      with:
        namespaceName: tools.namespaceName
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: oracle-cloud-get-bucket
      description: Oracle Cloud Get Bucket
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: object-storage-buckets.getbucket
      with:
        namespaceName: tools.namespaceName
        bucketName: tools.bucketName
      outputParameters:
      - type: object
        mapping: $.
    - name: oracle-cloud-update-bucket
      description: Oracle Cloud Update Bucket
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: object-storage-buckets.updatebucket
      with:
        namespaceName: tools.namespaceName
        bucketName: tools.bucketName
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: oracle-cloud-delete-bucket
      description: Oracle Cloud Delete Bucket
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: object-storage-buckets.deletebucket
      with:
        namespaceName: tools.namespaceName
        bucketName: tools.bucketName
      outputParameters:
      - type: object
        mapping: $.
