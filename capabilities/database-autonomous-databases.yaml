naftiko: 1.0.0-alpha2
info:
  label: Oracle Cloud Database API — Autonomous Databases
  description: 'Oracle Cloud Database API — Autonomous Databases. 7 operations. Lead operation: Oracle Cloud List Autonomous
    Databases. Self-contained Naftiko capability covering one Oracle Cloud business surface.'
  tags:
  - Oracle Cloud
  - Autonomous Databases
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ORACLE_CLOUD_API_KEY: ORACLE_CLOUD_API_KEY
capability:
