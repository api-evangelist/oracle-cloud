naftiko: 1.0.0-alpha2
info:
  label: Oracle Cloud Identity and Access Management API — Users
  description: 'Oracle Cloud Identity and Access Management API — Users. 5 operations. Lead operation: Oracle Cloud List Users.
    Self-contained Naftiko capability covering one Oracle Cloud business surface.'
  tags:
  - Oracle Cloud
  - Users
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ORACLE_CLOUD_API_KEY: ORACLE_CLOUD_API_KEY
capability:
  consumes:
  - type: http
    namespace: iam-users
    baseUri: https://identity.{region}.oraclecloud.com/20160918
    description: Oracle Cloud Identity and Access Management API — Users business capability. Self-contained, no shared references.
    resources:
    - name: users
      path: /users
      operations:
      - name: listusers
        method: GET
        description: Oracle Cloud List Users
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: compartmentId
          in: query
          type: string
          description: The OCID of the tenancy.
          required: true
        - name: limit
          in: query
          type: integer
          description: Maximum number of items to return.
      - name: createuser
        method: POST
        description: Oracle Cloud Create User
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: users-userId
      path: /users/{userId}
      operations:
      - name: getuser
        method: GET
        description: Oracle Cloud Get User
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: userId
          in: path
          type: string
          description: The OCID of the user.
          required: true
      - name: updateuser
        method: PUT
        description: Oracle Cloud Update User
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: userId
          in: path
          type: string
          description: The OCID of the user.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deleteuser
        method: DELETE
        description: Oracle Cloud Delete User
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: userId
          in: path
          type: string
          description: The OCID of the user.
          required: true
    authentication:
      type: bearer
      token: '{{env.ORACLE_CLOUD_API_KEY}}'
  exposes:
  - type: rest
    namespace: iam-users-rest
    port: 8080
    description: REST adapter for Oracle Cloud Identity and Access Management API — Users. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/users
      name: users
      description: REST surface for users.
      operations:
      - method: GET
        name: listusers
        description: Oracle Cloud List Users
        call: iam-users.listusers
        with:
          compartmentId: rest.compartmentId
          limit: rest.limit
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createuser
        description: Oracle Cloud Create User
        call: iam-users.createuser
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/users/{userid}
      name: users-userid
      description: REST surface for users-userId.
      operations:
      - method: GET
        name: getuser
        description: Oracle Cloud Get User
        call: iam-users.getuser
        with:
          userId: rest.userId
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updateuser
        description: Oracle Cloud Update User
        call: iam-users.updateuser
        with:
          userId: rest.userId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleteuser
        description: Oracle Cloud Delete User
        call: iam-users.deleteuser
        with:
          userId: rest.userId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: iam-users-mcp
    port: 9090
    transport: http
    description: MCP adapter for Oracle Cloud Identity and Access Management API — Users. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: oracle-cloud-list-users
      description: Oracle Cloud List Users
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: iam-users.listusers
      with:
        compartmentId: tools.compartmentId
        limit: tools.limit
      outputParameters:
      - type: object
        mapping: $.
    - name: oracle-cloud-create-user
      description: Oracle Cloud Create User
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: iam-users.createuser
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: oracle-cloud-get-user
      description: Oracle Cloud Get User
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: iam-users.getuser
      with:
        userId: tools.userId
      outputParameters:
      - type: object
        mapping: $.
    - name: oracle-cloud-update-user
      description: Oracle Cloud Update User
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: iam-users.updateuser
      with:
        userId: tools.userId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: oracle-cloud-delete-user
      description: Oracle Cloud Delete User
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: iam-users.deleteuser
      with:
        userId: tools.userId
      outputParameters:
      - type: object
        mapping: $.
