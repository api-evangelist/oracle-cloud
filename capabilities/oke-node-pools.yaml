        readOnly: false
        destructive: false
        idempotent: false
      call: oke-node-pools.createnodepool
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: oracle-cloud-get-node-pool
      description: Oracle Cloud Get Node Pool
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: oke-node-pools.getnodepool
      with:
        nodePoolId: tools.nodePoolId
      outputParameters:
      - type: object
        mapping: $.
    - name: oracle-cloud-delete-node-pool
      description: Oracle Cloud Delete Node Pool
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: oke-node-pools.deletenodepool
      with:
        nodePoolId: tools.nodePoolId
      outputParameters:
      - type: object
        mapping: $.
