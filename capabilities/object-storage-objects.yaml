naftiko: 1.0.0-alpha2
info:
  label: Oracle Cloud Object Storage API — Objects
  description: 'Oracle Cloud Object Storage API — Objects. 4 operations. Lead operation: Oracle Cloud List Objects. Self-contained
    Naftiko capability covering one Oracle Cloud business surface.'
  tags:
  - Oracle Cloud
  - Objects
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ORACLE_CLOUD_API_KEY: ORACLE_CLOUD_API_KEY
capability:
  consumes:
  - type: http
    namespace: object-storage-objects
    baseUri: https://objectstorage.{region}.oraclecloud.com
    description: Oracle Cloud Object Storage API — Objects business capability. Self-contained, no shared references.
    resources:
    - name: n-namespaceName-b-bucketName-o
      path: /n/{namespaceName}/b/{bucketName}/o
      operations:
      - name: listobjects
        method: GET
        description: Oracle Cloud List Objects
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: namespaceName
          in: path
          type: string
          description: The Object Storage namespace.
          required: true
        - name: bucketName
          in: path
          type: string
          description: The name of the bucket.
          required: true
        - name: prefix
          in: query
          type: string
          description: Filter objects whose name begins with this prefix.
        - name: delimiter
          in: query
          type: string
          description: Delimiter for pseudo-directory grouping.
        - name: limit
          in: query
          type: integer
          description: Maximum number of items to return.
        - name: start
          in: query
          type: string
          description: Object name to start listing from.
    - name: n-namespaceName-b-bucketName-o-objectName
      path: /n/{namespaceName}/b/{bucketName}/o/{objectName}
      operations:
      - name: getobject
        method: GET
        description: Oracle Cloud Get Object
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: namespaceName
          in: path
          type: string
          description: The Object Storage namespace.
          required: true
        - name: bucketName
          in: path
          type: string
          description: The name of the bucket.
          required: true
        - name: objectName
          in: path
          type: string
          description: The name of the object.
          required: true
      - name: putobject
        method: PUT
        description: Oracle Cloud Put Object
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: namespaceName
          in: path
          type: string
          description: The Object Storage namespace.
          required: true
        - name: bucketName
          in: path
          type: string
          description: The name of the bucket.
          required: true
        - name: objectName
          in: path
          type: string
          description: The name of the object.
          required: true
        - name: Content-Type
          in: header
          type: string
          description: The content type of the body.
        - name: Content-Length
          in: header
          type: integer
          description: The content length of the body.
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deleteobject
        method: DELETE
        description: Oracle Cloud Delete Object
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: namespaceName
          in: path
          type: string
          description: The Object Storage namespace.
          required: true
        - name: bucketName
          in: path
          type: string
          description: The name of the bucket.
          required: true
        - name: objectName
          in: path
          type: string
          description: The name of the object.
          required: true
    authentication:
      type: bearer
      token: '{{env.ORACLE_CLOUD_API_KEY}}'
  exposes:
  - type: rest
    namespace: object-storage-objects-rest
    port: 8080
    description: REST adapter for Oracle Cloud Object Storage API — Objects. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/n/{namespacename}/b/{bucketname}/o
      name: n-namespacename-b-bucketname-o
      description: REST surface for n-namespaceName-b-bucketName-o.
      operations:
      - method: GET
        name: listobjects
        description: Oracle Cloud List Objects
        call: object-storage-objects.listobjects
        with:
          namespaceName: rest.namespaceName
          bucketName: rest.bucketName
          prefix: rest.prefix
          delimiter: rest.delimiter
          limit: rest.limit
          start: rest.start
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/n/{namespacename}/b/{bucketname}/o/{objectname}
      name: n-namespacename-b-bucketname-o-objectname
      description: REST surface for n-namespaceName-b-bucketName-o-objectName.
      operations:
      - method: GET
        name: getobject
        description: Oracle Cloud Get Object
        call: object-storage-objects.getobject
        with:
          namespaceName: rest.namespaceName
          bucketName: rest.bucketName
          objectName: rest.objectName
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: putobject
        description: Oracle Cloud Put Object
        call: object-storage-objects.putobject
        with:
          namespaceName: rest.namespaceName
          bucketName: rest.bucketName
          objectName: rest.objectName
          Content-Type: rest.Content-Type
          Content-Length: rest.Content-Length
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleteobject
        description: Oracle Cloud Delete Object
        call: object-storage-objects.deleteobject
        with:
          namespaceName: rest.namespaceName
          bucketName: rest.bucketName
          objectName: rest.objectName
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: object-storage-objects-mcp
    port: 9090
    transport: http
    description: MCP adapter for Oracle Cloud Object Storage API — Objects. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: oracle-cloud-list-objects
      description: Oracle Cloud List Objects
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: object-storage-objects.listobjects
      with:
        namespaceName: tools.namespaceName
        bucketName: tools.bucketName
        prefix: tools.prefix
        delimiter: tools.delimiter
        limit: tools.limit
        start: tools.start
      outputParameters:
      - type: object
        mapping: $.
    - name: oracle-cloud-get-object
      description: Oracle Cloud Get Object
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: object-storage-objects.getobject
      with:
        namespaceName: tools.namespaceName
        bucketName: tools.bucketName
        objectName: tools.objectName
      outputParameters:
      - type: object
        mapping: $.
    - name: oracle-cloud-put-object
      description: Oracle Cloud Put Object
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: object-storage-objects.putobject
      with:
        namespaceName: tools.namespaceName
        bucketName: tools.bucketName
        objectName: tools.objectName
        Content-Type: tools.Content-Type
        Content-Length: tools.Content-Length
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: oracle-cloud-delete-object
      description: Oracle Cloud Delete Object
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: object-storage-objects.deleteobject
      with:
        namespaceName: tools.namespaceName
        bucketName: tools.bucketName
        objectName: tools.objectName
      outputParameters:
      - type: object
        mapping: $.
