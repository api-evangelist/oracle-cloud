    namespace: networking-subnets
    baseUri: https://iaas.{region}.oraclecloud.com/20160918
    description: Oracle Cloud Networking API — Subnets business capability. Self-contained, no shared references.
    resources:
    - name: subnets
      path: /subnets
      operations:
      - name: listsubnets
        method: GET
        description: Oracle Cloud List Subnets
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: compartmentId
          in: query
          type: string
          description: The OCID of the compartment.
          required: true
        - name: vcnId
          in: query
          type: string
          description: The OCID of the VCN.
        - name: limit
          in: query
          type: integer
          description: Maximum number of items to return.
      - name: createsubnet
        method: POST
        description: Oracle Cloud Create Subnet
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: subnets-subnetId
      path: /subnets/{subnetId}
      operations:
      - name: getsubnet
        method: GET
        description: Oracle Cloud Get Subnet
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: subnetId
          in: path
          type: string
          description: The OCID of the subnet.
          required: true
      - name: deletesubnet
        method: DELETE
        description: Oracle Cloud Delete Subnet
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: subnetId
          in: path
          type: string
          description: The OCID of the subnet.
          required: true
    authentication:
      type: bearer
      token: '{{env.ORACLE_CLOUD_API_KEY}}'
  exposes:
  - type: rest
    namespace: networking-subnets-rest
    port: 8080
    description: REST adapter for Oracle Cloud Networking API — Subnets. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/subnets
      name: subnets
      description: REST surface for subnets.
      operations:
      - method: GET
        name: listsubnets
        description: Oracle Cloud List Subnets
        call: networking-subnets.listsubnets
        with:
          compartmentId: rest.compartmentId
          vcnId: rest.vcnId
          limit: rest.limit
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createsubnet
        description: Oracle Cloud Create Subnet
        call: networking-subnets.createsubnet
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/subnets/{subnetid}
      name: subnets-subnetid
      description: REST surface for subnets-subnetId.
      operations:
      - method: GET
        name: getsubnet
        description: Oracle Cloud Get Subnet
        call: networking-subnets.getsubnet
        with:
          subnetId: rest.subnetId
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletesubnet
        description: Oracle Cloud Delete Subnet
        call: networking-subnets.deletesubnet
        with:
          subnetId: rest.subnetId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
