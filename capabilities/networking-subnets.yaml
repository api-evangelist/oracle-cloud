        readOnly: false
        destructive: false
        idempotent: false
      call: networking-subnets.createsubnet
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: oracle-cloud-get-subnet
      description: Oracle Cloud Get Subnet
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: networking-subnets.getsubnet
      with:
        subnetId: tools.subnetId
      outputParameters:
      - type: object
        mapping: $.
    - name: oracle-cloud-delete-subnet
      description: Oracle Cloud Delete Subnet
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: networking-subnets.deletesubnet
      with:
        subnetId: tools.subnetId
      outputParameters:
      - type: object
        mapping: $.
