naftiko: 1.0.0-alpha1
info:
  label: Oracle Cloud Functions API
  description: Serverless platform for building and running applications on Oracle Cloud Infrastructure.
  tags:
  - Applications
  - Functions
  created: '2026-04-18'
  modified: '2026-04-18'
binds:
- namespace: env
  keys:
    OCI_API_KEY: OCI_API_KEY
    OCI_TENANCY_OCID: OCI_TENANCY_OCID
capability:
  consumes:
  - type: http
    namespace: functions
    baseUri: https://functions.{region}.oraclecloud.com/20181201
    description: Serverless platform for building and running applications on Oracle Cloud Infrastructure.
    authentication:
      type: bearer
      token: '{{OCI_API_KEY}}'
    resources:
    - name: applications
      path: applications
      description: Applications
      operations:
      - name: listApplications
        method: GET
        description: Oracle Cloud List Applications
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: compartmentId
          in: query
          type: string
          required: true
          description: The OCID of the compartment.
      - name: createApplication
        method: POST
        description: Oracle Cloud Create Application
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getApplication
        method: GET
        description: Oracle Cloud Get Application
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: applicationId
          in: path
          type: string
          required: true
          description: The OCID of the application.
      - name: deleteApplication
        method: DELETE
        description: Oracle Cloud Delete Application
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: applicationId
          in: path
          type: string
          required: true
          description: The OCID of the application.
    - name: functions
      path: functions
      description: Functions
      operations:
      - name: listFunctions
        method: GET
        description: Oracle Cloud List Functions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: applicationId
          in: query
          type: string
          required: true
          description: The OCID of the application.
      - name: createFunction
        method: POST
        description: Oracle Cloud Create Function
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getFunction
        method: GET
        description: Oracle Cloud Get Function
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: functionId
          in: path
          type: string
          required: true
          description: The OCID of the function.
      - name: deleteFunction
        method: DELETE
        description: Oracle Cloud Delete Function
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: functionId
          in: path
          type: string
          required: true
          description: The OCID of the function.
      - name: invokeFunction
        method: POST
        description: Oracle Cloud Invoke Function
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: functionId
          in: path
          type: string
          required: true
          description: The OCID of the function.
  exposes:
  - type: rest
    port: 8106
    namespace: functions-api
    resources:
    - path: /v1/applications
      name: applications
      description: Applications
    - path: /v1/functions
      name: functions
      description: Functions
  - type: mcp
    port: 9106
    namespace: functions-mcp
    transport: http
    tools:
    - name: listApplications
      description: Oracle Cloud List Applications
      hints:
        readOnly: true
        destructive: false
      call: functions.listApplications
      outputParameters:
      - type: object
        mapping: $.
    - name: createApplication
      description: Oracle Cloud Create Application
      hints:
        readOnly: false
        destructive: false
      call: functions.createApplication
      outputParameters:
      - type: object
        mapping: $.
    - name: getApplication
      description: Oracle Cloud Get Application
      hints:
        readOnly: true
        destructive: false
      call: functions.getApplication
      outputParameters:
      - type: object
        mapping: $.
    - name: deleteApplication
      description: Oracle Cloud Delete Application
      hints:
        readOnly: false
        destructive: true
      call: functions.deleteApplication
      outputParameters:
      - type: object
        mapping: $.
    - name: listFunctions
      description: Oracle Cloud List Functions
      hints:
        readOnly: true
        destructive: false
      call: functions.listFunctions
      outputParameters:
      - type: object
        mapping: $.
    - name: createFunction
      description: Oracle Cloud Create Function
      hints:
        readOnly: false
        destructive: false
      call: functions.createFunction
      outputParameters:
      - type: object
        mapping: $.
    - name: getFunction
      description: Oracle Cloud Get Function
      hints:
        readOnly: true
        destructive: false
      call: functions.getFunction
      outputParameters:
      - type: object
        mapping: $.
    - name: deleteFunction
      description: Oracle Cloud Delete Function
      hints:
        readOnly: false
        destructive: true
      call: functions.deleteFunction
      outputParameters:
      - type: object
        mapping: $.
    - name: invokeFunction
      description: Oracle Cloud Invoke Function
      hints:
        readOnly: false
        destructive: false
      call: functions.invokeFunction
      outputParameters:
      - type: object
        mapping: $.
