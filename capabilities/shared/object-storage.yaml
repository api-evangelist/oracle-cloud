naftiko: 1.0.0-alpha1
info:
  label: Oracle Cloud Object Storage API
  description: Store and retrieve large amounts of unstructured data in Oracle Cloud Infrastructure Object Storage.
  tags:
  - Preauthenticated Requests
  - Namespaces
  - Objects
  - Buckets
  created: '2026-04-18'
  modified: '2026-04-18'
binds:
- namespace: env
  keys:
    OCI_API_KEY: OCI_API_KEY
    OCI_TENANCY_OCID: OCI_TENANCY_OCID
capability:
  consumes:
  - type: http
    namespace: object-storage
    baseUri: https://objectstorage.{region}.oraclecloud.com
    description: Store and retrieve large amounts of unstructured data in Oracle Cloud Infrastructure Object Storage.
    authentication:
      type: bearer
      token: '{{OCI_API_KEY}}'
    resources:
    - name: namespaces
      path: n
      description: Namespaces
      operations:
      - name: getNamespace
        method: GET
        description: Oracle Cloud Get Namespace
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: buckets
      path: n
      description: Buckets
      operations:
      - name: listBuckets
        method: GET
        description: Oracle Cloud List Buckets
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: namespaceName
          in: path
          type: string
          required: true
          description: The Object Storage namespace.
        - name: compartmentId
          in: query
          type: string
          required: true
          description: The OCID of the compartment.
        - name: limit
          in: query
          type: integer
          required: false
          description: Maximum number of items to return.
        - name: page
          in: query
          type: string
          required: false
          description: Pagination token.
      - name: createBucket
        method: POST
        description: Oracle Cloud Create Bucket
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: namespaceName
          in: path
          type: string
          required: true
          description: The Object Storage namespace.
      - name: getBucket
        method: GET
        description: Oracle Cloud Get Bucket
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: namespaceName
          in: path
          type: string
          required: true
          description: The Object Storage namespace.
        - name: bucketName
          in: path
          type: string
          required: true
          description: The name of the bucket.
      - name: updateBucket
        method: PUT
        description: Oracle Cloud Update Bucket
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: namespaceName
          in: path
          type: string
          required: true
          description: The Object Storage namespace.
        - name: bucketName
          in: path
          type: string
          required: true
          description: The name of the bucket.
      - name: deleteBucket
        method: DELETE
        description: Oracle Cloud Delete Bucket
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: namespaceName
          in: path
          type: string
          required: true
          description: The Object Storage namespace.
        - name: bucketName
          in: path
          type: string
          required: true
          description: The name of the bucket.
    - name: objects
      path: n
      description: Objects
      operations:
      - name: listObjects
        method: GET
        description: Oracle Cloud List Objects
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: namespaceName
          in: path
          type: string
          required: true
          description: The Object Storage namespace.
        - name: bucketName
          in: path
          type: string
          required: true
          description: The name of the bucket.
        - name: prefix
          in: query
          type: string
          required: false
          description: Filter objects whose name begins with this prefix.
        - name: delimiter
          in: query
          type: string
          required: false
          description: Delimiter for pseudo-directory grouping.
        - name: limit
          in: query
          type: integer
          required: false
          description: Maximum number of items to return.
        - name: start
          in: query
          type: string
          required: false
          description: Object name to start listing from.
      - name: getObject
        method: GET
        description: Oracle Cloud Get Object
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: namespaceName
          in: path
          type: string
          required: true
          description: The Object Storage namespace.
        - name: bucketName
          in: path
          type: string
          required: true
          description: The name of the bucket.
        - name: objectName
          in: path
          type: string
          required: true
          description: The name of the object.
      - name: putObject
        method: PUT
        description: Oracle Cloud Put Object
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: namespaceName
          in: path
          type: string
          required: true
          description: The Object Storage namespace.
        - name: bucketName
          in: path
          type: string
          required: true
          description: The name of the bucket.
        - name: objectName
          in: path
          type: string
          required: true
          description: The name of the object.
        - name: Content-Type
          in: header
          type: string
          required: false
          description: The content type of the body.
        - name: Content-Length
          in: header
          type: integer
          required: false
          description: The content length of the body.
      - name: deleteObject
        method: DELETE
        description: Oracle Cloud Delete Object
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: namespaceName
          in: path
          type: string
          required: true
          description: The Object Storage namespace.
        - name: bucketName
          in: path
          type: string
          required: true
          description: The name of the bucket.
        - name: objectName
          in: path
          type: string
          required: true
          description: The name of the object.
    - name: preauthenticated-requests
      path: n
      description: Preauthenticated Requests
      operations:
      - name: listPreauthenticatedRequests
        method: GET
        description: Oracle Cloud List Preauthenticated Requests
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: namespaceName
          in: path
          type: string
          required: true
          description: The Object Storage namespace.
        - name: bucketName
          in: path
          type: string
          required: true
          description: The name of the bucket.
        - name: limit
          in: query
          type: integer
          required: false
          description: Maximum number of items to return.
      - name: createPreauthenticatedRequest
        method: POST
        description: Oracle Cloud Create Preauthenticated Request
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: namespaceName
          in: path
          type: string
          required: true
          description: The Object Storage namespace.
        - name: bucketName
          in: path
          type: string
          required: true
          description: The name of the bucket.
  exposes:
  - type: rest
    port: 8101
    namespace: object-storage-api
    resources:
    - path: /v1/namespaces
      name: namespaces
      description: Namespaces
    - path: /v1/buckets
      name: buckets
      description: Buckets
    - path: /v1/objects
      name: objects
      description: Objects
    - path: /v1/preauthenticated-requests
      name: preauthenticated-requests
      description: Preauthenticated Requests
  - type: mcp
    port: 9101
    namespace: object-storage-mcp
    transport: http
    tools:
    - name: getNamespace
      description: Oracle Cloud Get Namespace
      hints:
        readOnly: true
        destructive: false
      call: object-storage.getNamespace
      outputParameters:
      - type: object
        mapping: $.
    - name: listBuckets
      description: Oracle Cloud List Buckets
      hints:
        readOnly: true
        destructive: false
      call: object-storage.listBuckets
      outputParameters:
      - type: object
        mapping: $.
    - name: createBucket
      description: Oracle Cloud Create Bucket
      hints:
        readOnly: false
        destructive: false
      call: object-storage.createBucket
      outputParameters:
      - type: object
        mapping: $.
    - name: getBucket
      description: Oracle Cloud Get Bucket
      hints:
        readOnly: true
        destructive: false
      call: object-storage.getBucket
      outputParameters:
      - type: object
        mapping: $.
    - name: updateBucket
      description: Oracle Cloud Update Bucket
      hints:
        readOnly: false
        destructive: false
      call: object-storage.updateBucket
      outputParameters:
      - type: object
        mapping: $.
    - name: deleteBucket
      description: Oracle Cloud Delete Bucket
      hints:
        readOnly: false
        destructive: true
      call: object-storage.deleteBucket
      outputParameters:
      - type: object
        mapping: $.
    - name: listObjects
      description: Oracle Cloud List Objects
      hints:
        readOnly: true
        destructive: false
      call: object-storage.listObjects
      outputParameters:
      - type: object
        mapping: $.
    - name: getObject
      description: Oracle Cloud Get Object
      hints:
        readOnly: true
        destructive: false
      call: object-storage.getObject
      outputParameters:
      - type: object
        mapping: $.
    - name: putObject
      description: Oracle Cloud Put Object
      hints:
        readOnly: false
        destructive: false
      call: object-storage.putObject
      outputParameters:
      - type: object
        mapping: $.
    - name: deleteObject
      description: Oracle Cloud Delete Object
      hints:
        readOnly: false
        destructive: true
      call: object-storage.deleteObject
      outputParameters:
      - type: object
        mapping: $.
    - name: listPreauthenticatedRequests
      description: Oracle Cloud List Preauthenticated Requests
      hints:
        readOnly: true
        destructive: false
      call: object-storage.listPreauthenticatedRequests
      outputParameters:
      - type: object
        mapping: $.
    - name: createPreauthenticatedRequest
      description: Oracle Cloud Create Preauthenticated Request
      hints:
        readOnly: false
        destructive: false
      call: object-storage.createPreauthenticatedRequest
      outputParameters:
      - type: object
        mapping: $.
