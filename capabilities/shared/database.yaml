naftiko: 1.0.0-alpha1
info:
  label: Oracle Cloud Database API
  description: Manage Oracle Database Cloud Services and Autonomous Databases in Oracle Cloud Infrastructure.
  tags:
  - Db Systems
  - Autonomous Databases
  created: '2026-04-18'
  modified: '2026-04-18'
binds:
- namespace: env
  keys:
    OCI_API_KEY: OCI_API_KEY
    OCI_TENANCY_OCID: OCI_TENANCY_OCID
capability:
  consumes:
  - type: http
    namespace: database
    baseUri: https://database.{region}.oraclecloud.com/20160918
    description: Manage Oracle Database Cloud Services and Autonomous Databases in Oracle Cloud Infrastructure.
    authentication:
      type: bearer
      token: '{{OCI_API_KEY}}'
    resources:
    - name: autonomous-databases
      path: autonomousDatabases
      description: Autonomous Databases
      operations:
      - name: listAutonomousDatabases
        method: GET
        description: Oracle Cloud List Autonomous Databases
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: compartmentId
          in: query
          type: string
          required: true
          description: The OCID of the compartment.
        - name: limit
          in: query
          type: integer
          required: false
          description: Maximum number of items to return.
        - name: page
          in: query
          type: string
          required: false
          description: Pagination token.
      - name: createAutonomousDatabase
        method: POST
        description: Oracle Cloud Create Autonomous Database
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getAutonomousDatabase
        method: GET
        description: Oracle Cloud Get Autonomous Database
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: autonomousDatabaseId
          in: path
          type: string
          required: true
          description: The OCID of the Autonomous Database.
      - name: updateAutonomousDatabase
        method: PUT
        description: Oracle Cloud Update Autonomous Database
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: autonomousDatabaseId
          in: path
          type: string
          required: true
          description: The OCID of the Autonomous Database.
      - name: deleteAutonomousDatabase
        method: DELETE
        description: Oracle Cloud Delete Autonomous Database
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: autonomousDatabaseId
          in: path
          type: string
          required: true
          description: The OCID.
      - name: startAutonomousDatabase
        method: POST
        description: Oracle Cloud Start Autonomous Database
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: autonomousDatabaseId
          in: path
          type: string
          required: true
          description: The OCID.
      - name: stopAutonomousDatabase
        method: POST
        description: Oracle Cloud Stop Autonomous Database
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: autonomousDatabaseId
          in: path
          type: string
          required: true
          description: The OCID.
    - name: db-systems
      path: dbSystems
      description: DB Systems
      operations:
      - name: listDbSystems
        method: GET
        description: Oracle Cloud List DB Systems
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: compartmentId
          in: query
          type: string
          required: true
          description: The OCID of the compartment.
        - name: limit
          in: query
          type: integer
          required: false
          description: Maximum number of items to return.
      - name: getDbSystem
        method: GET
        description: Oracle Cloud Get DB System
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: dbSystemId
          in: path
          type: string
          required: true
          description: The OCID of the DB system.
  exposes:
  - type: rest
    port: 8103
    namespace: database-api
    resources:
    - path: /v1/autonomous-databases
      name: autonomous-databases
      description: Autonomous Databases
    - path: /v1/db-systems
      name: db-systems
      description: DB Systems
  - type: mcp
    port: 9103
    namespace: database-mcp
    transport: http
    tools:
    - name: listAutonomousDatabases
      description: Oracle Cloud List Autonomous Databases
      hints:
        readOnly: true
        destructive: false
      call: database.listAutonomousDatabases
      outputParameters:
      - type: object
        mapping: $.
    - name: createAutonomousDatabase
      description: Oracle Cloud Create Autonomous Database
      hints:
        readOnly: false
        destructive: false
      call: database.createAutonomousDatabase
      outputParameters:
      - type: object
        mapping: $.
    - name: getAutonomousDatabase
      description: Oracle Cloud Get Autonomous Database
      hints:
        readOnly: true
        destructive: false
      call: database.getAutonomousDatabase
      outputParameters:
      - type: object
        mapping: $.
    - name: updateAutonomousDatabase
      description: Oracle Cloud Update Autonomous Database
      hints:
        readOnly: false
        destructive: false
      call: database.updateAutonomousDatabase
      outputParameters:
      - type: object
        mapping: $.
    - name: deleteAutonomousDatabase
      description: Oracle Cloud Delete Autonomous Database
      hints:
        readOnly: false
        destructive: true
      call: database.deleteAutonomousDatabase
      outputParameters:
      - type: object
        mapping: $.
    - name: startAutonomousDatabase
      description: Oracle Cloud Start Autonomous Database
      hints:
        readOnly: false
        destructive: false
      call: database.startAutonomousDatabase
      outputParameters:
      - type: object
        mapping: $.
    - name: stopAutonomousDatabase
      description: Oracle Cloud Stop Autonomous Database
      hints:
        readOnly: false
        destructive: false
      call: database.stopAutonomousDatabase
      outputParameters:
      - type: object
        mapping: $.
    - name: listDbSystems
      description: Oracle Cloud List DB Systems
      hints:
        readOnly: true
        destructive: false
      call: database.listDbSystems
      outputParameters:
      - type: object
        mapping: $.
    - name: getDbSystem
      description: Oracle Cloud Get DB System
      hints:
        readOnly: true
        destructive: false
      call: database.getDbSystem
      outputParameters:
      - type: object
        mapping: $.
