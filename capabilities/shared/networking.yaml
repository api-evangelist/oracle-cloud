          in: query
          type: string
          required: true
          description: The OCID of the compartment.
        - name: vcnId
          in: query
          type: string
          required: false
          description: The OCID of the VCN.
    - name: internet-gateways
      path: internetGateways
      description: Internet Gateways
      operations:
      - name: listInternetGateways
        method: GET
        description: Oracle Cloud List Internet Gateways
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: compartmentId
          in: query
          type: string
          required: true
          description: The OCID of the compartment.
        - name: vcnId
          in: query
          type: string
          required: false
          description: The OCID of the VCN.
      - name: createInternetGateway
        method: POST
        description: Oracle Cloud Create Internet Gateway
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: route-tables
      path: routeTables
      description: Route Tables
      operations:
