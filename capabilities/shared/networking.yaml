naftiko: 1.0.0-alpha1
info:
  label: Oracle Cloud Networking API
  description: Manage virtual cloud networks, subnets, security lists, and network resources in Oracle Cloud Infrastructure.
  tags:
  - Vcns
  - Route Tables
  - Security Lists
  - Internet Gateways
  - Subnets
  created: '2026-04-18'
  modified: '2026-04-18'
binds:
- namespace: env
  keys:
    OCI_API_KEY: OCI_API_KEY
    OCI_TENANCY_OCID: OCI_TENANCY_OCID
capability:
  consumes:
  - type: http
    namespace: networking
    baseUri: https://iaas.{region}.oraclecloud.com/20160918
    description: Manage virtual cloud networks, subnets, security lists, and network resources in Oracle Cloud Infrastructure.
    authentication:
      type: bearer
      token: '{{OCI_API_KEY}}'
    resources:
    - name: vcns
      path: vcns
      description: VCNs
      operations:
      - name: listVcns
        method: GET
        description: Oracle Cloud List VCNs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: compartmentId
          in: query
          type: string
          required: true
          description: The OCID of the compartment.
        - name: limit
          in: query
          type: integer
          required: false
          description: Maximum number of items to return.
        - name: page
          in: query
          type: string
          required: false
          description: Pagination token.
      - name: createVcn
        method: POST
        description: Oracle Cloud Create VCN
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getVcn
        method: GET
        description: Oracle Cloud Get VCN
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: vcnId
          in: path
          type: string
          required: true
          description: The OCID of the VCN.
      - name: updateVcn
        method: PUT
        description: Oracle Cloud Update VCN
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: vcnId
          in: path
          type: string
          required: true
          description: The OCID of the VCN.
      - name: deleteVcn
        method: DELETE
        description: Oracle Cloud Delete VCN
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: vcnId
          in: path
          type: string
          required: true
          description: The OCID of the VCN.
    - name: subnets
      path: subnets
      description: Subnets
      operations:
      - name: listSubnets
        method: GET
        description: Oracle Cloud List Subnets
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: compartmentId
          in: query
          type: string
          required: true
          description: The OCID of the compartment.
        - name: vcnId
          in: query
          type: string
          required: false
          description: The OCID of the VCN.
        - name: limit
          in: query
          type: integer
          required: false
          description: Maximum number of items to return.
      - name: createSubnet
        method: POST
        description: Oracle Cloud Create Subnet
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getSubnet
        method: GET
        description: Oracle Cloud Get Subnet
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: subnetId
          in: path
          type: string
          required: true
          description: The OCID of the subnet.
      - name: deleteSubnet
        method: DELETE
        description: Oracle Cloud Delete Subnet
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: subnetId
          in: path
          type: string
          required: true
          description: The OCID of the subnet.
    - name: security-lists
      path: securityLists
      description: Security Lists
      operations:
      - name: listSecurityLists
        method: GET
        description: Oracle Cloud List Security Lists
        outputRawFormat: json
        outputParameters:
