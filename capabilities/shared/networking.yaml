    - path: /v1/internet-gateways
      name: internet-gateways
      description: Internet Gateways
    - path: /v1/route-tables
      name: route-tables
      description: Route Tables
  - type: mcp
    port: 9102
    namespace: networking-mcp
    transport: http
    tools:
    - name: listVcns
      description: Oracle Cloud List VCNs
      hints:
        readOnly: true
        destructive: false
