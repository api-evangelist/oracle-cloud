naftiko: 1.0.0-alpha1
info:
  label: Oracle Cloud Compute API
  description: Manage compute instances, images, shapes, and related resources in Oracle Cloud Infrastructure.
  tags:
  - Instances
  - Shapes
  - Volume Attachments
  - Images
  created: '2026-04-18'
  modified: '2026-04-18'
binds:
- namespace: env
  keys:
    OCI_API_KEY: OCI_API_KEY
    OCI_TENANCY_OCID: OCI_TENANCY_OCID
capability:
  consumes:
  - type: http
    namespace: compute
    baseUri: https://iaas.{region}.oraclecloud.com/20160918
    description: Manage compute instances, images, shapes, and related resources in Oracle Cloud Infrastructure.
    authentication:
      type: bearer
      token: '{{OCI_API_KEY}}'
    resources:
    - name: instances
      path: instances
      description: Instances
      operations:
      - name: listInstances
        method: GET
        description: Oracle Cloud List Instances
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: compartmentId
          in: query
          type: string
          required: true
          description: The OCID of the compartment.
        - name: availabilityDomain
          in: query
          type: string
          required: false
          description: The name of the availability domain.
        - name: displayName
          in: query
          type: string
          required: false
          description: A filter to return only resources matching the display name.
        - name: lifecycleState
          in: query
          type: string
          required: false
          description: A filter to return only resources matching the lifecycle state.
        - name: limit
          in: query
          type: integer
          required: false
          description: The maximum number of items to return per page.
        - name: page
          in: query
          type: string
          required: false
          description: Pagination token from a previous list call.
      - name: launchInstance
        method: POST
        description: Oracle Cloud Launch Instance
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getInstance
        method: GET
        description: Oracle Cloud Get Instance
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: instanceId
          in: path
          type: string
          required: true
          description: The OCID of the instance.
      - name: updateInstance
        method: PUT
        description: Oracle Cloud Update Instance
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: instanceId
          in: path
          type: string
          required: true
          description: The OCID of the instance.
      - name: terminateInstance
        method: DELETE
        description: Oracle Cloud Terminate Instance
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: instanceId
          in: path
          type: string
          required: true
          description: The OCID of the instance.
        - name: preserveBootVolume
          in: query
          type: boolean
          required: false
          description: Whether to preserve the boot volume when terminating.
      - name: instanceAction
        method: POST
        description: Oracle Cloud Instance Action
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: instanceId
          in: path
          type: string
          required: true
          description: The OCID of the instance.
        - name: action
          in: path
          type: string
          required: true
          description: The action to perform on the instance.
    - name: images
      path: images
      description: Images
      operations:
      - name: listImages
        method: GET
        description: Oracle Cloud List Images
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: compartmentId
          in: query
          type: string
          required: true
          description: The OCID of the compartment.
        - name: operatingSystem
          in: query
          type: string
          required: false
          description: The image operating system.
        - name: limit
          in: query
          type: integer
          required: false
          description: Maximum number of items to return.
        - name: page
          in: query
          type: string
          required: false
          description: Pagination token.
      - name: getImage
        method: GET
        description: Oracle Cloud Get Image
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: imageId
          in: path
          type: string
          required: true
          description: The OCID of the image.
    - name: shapes
      path: shapes
      description: Shapes
      operations:
      - name: listShapes
        method: GET
        description: Oracle Cloud List Shapes
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: compartmentId
          in: query
          type: string
          required: true
          description: The OCID of the compartment.
        - name: limit
          in: query
          type: integer
          required: false
          description: Maximum number of items to return.
        - name: page
          in: query
          type: string
          required: false
          description: Pagination token.
    - name: volume-attachments
      path: volumeAttachments
      description: Volume Attachments
      operations:
      - name: listVolumeAttachments
        method: GET
        description: Oracle Cloud List Volume Attachments
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: compartmentId
          in: query
          type: string
          required: true
          description: The OCID of the compartment.
        - name: instanceId
          in: query
          type: string
          required: false
          description: The OCID of the instance.
        - name: limit
          in: query
          type: integer
          required: false
          description: Maximum number of items to return.
      - name: attachVolume
        method: POST
        description: Oracle Cloud Attach Volume
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: detachVolume
        method: DELETE
        description: Oracle Cloud Detach Volume
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: volumeAttachmentId
          in: path
          type: string
          required: true
          description: The OCID of the volume attachment.
  exposes:
  - type: rest
    port: 8100
    namespace: compute-api
    resources:
    - path: /v1/instances
      name: instances
      description: Instances
    - path: /v1/images
      name: images
      description: Images
    - path: /v1/shapes
      name: shapes
      description: Shapes
    - path: /v1/volume-attachments
      name: volume-attachments
      description: Volume Attachments
  - type: mcp
    port: 9100
    namespace: compute-mcp
    transport: http
    tools:
    - name: listInstances
      description: Oracle Cloud List Instances
      hints:
        readOnly: true
        destructive: false
      call: compute.listInstances
      outputParameters:
      - type: object
        mapping: $.
    - name: launchInstance
      description: Oracle Cloud Launch Instance
      hints:
        readOnly: false
        destructive: false
      call: compute.launchInstance
      outputParameters:
      - type: object
        mapping: $.
    - name: getInstance
      description: Oracle Cloud Get Instance
      hints:
        readOnly: true
        destructive: false
      call: compute.getInstance
      outputParameters:
      - type: object
        mapping: $.
    - name: updateInstance
      description: Oracle Cloud Update Instance
      hints:
        readOnly: false
        destructive: false
      call: compute.updateInstance
      outputParameters:
      - type: object
        mapping: $.
    - name: terminateInstance
      description: Oracle Cloud Terminate Instance
      hints:
        readOnly: false
        destructive: true
      call: compute.terminateInstance
      outputParameters:
      - type: object
        mapping: $.
    - name: instanceAction
      description: Oracle Cloud Instance Action
      hints:
        readOnly: false
        destructive: false
      call: compute.instanceAction
      outputParameters:
      - type: object
        mapping: $.
    - name: listImages
      description: Oracle Cloud List Images
      hints:
        readOnly: true
        destructive: false
      call: compute.listImages
      outputParameters:
      - type: object
        mapping: $.
    - name: getImage
      description: Oracle Cloud Get Image
      hints:
        readOnly: true
        destructive: false
      call: compute.getImage
      outputParameters:
      - type: object
        mapping: $.
    - name: listShapes
      description: Oracle Cloud List Shapes
      hints:
        readOnly: true
        destructive: false
      call: compute.listShapes
      outputParameters:
      - type: object
        mapping: $.
    - name: listVolumeAttachments
      description: Oracle Cloud List Volume Attachments
      hints:
        readOnly: true
        destructive: false
      call: compute.listVolumeAttachments
      outputParameters:
      - type: object
        mapping: $.
    - name: attachVolume
      description: Oracle Cloud Attach Volume
      hints:
        readOnly: false
        destructive: false
      call: compute.attachVolume
      outputParameters:
      - type: object
        mapping: $.
    - name: detachVolume
      description: Oracle Cloud Detach Volume
      hints:
        readOnly: false
        destructive: true
      call: compute.detachVolume
      outputParameters:
      - type: object
        mapping: $.
