capability:
  workflows:
  - name: infrastructure-management
    description: Unified workflow for managing compute instances, networking, and storage resources across OCI. Used by cloud administrators and DevOps engineers.
    apis:
    - compute
    - networking
    - object-storage
    persona: Cloud Administrator
  - name: data-platform
    description: Workflow for managing databases, data storage, and data processing across OCI. Used by data engineers and DBAs.
    apis:
    - database
    - object-storage
    persona: Data Engineer
  - name: cloud-native-development
    description: Workflow for building and deploying containerized and serverless applications on OCI. Used by application developers.
    apis:
    - oke
    - functions
    persona: Application Developer
  - name: security-and-compliance
    description: Workflow for managing identity, access control, and monitoring across OCI. Used by security engineers.
    apis:
    - iam
    - monitoring
    persona: Security Engineer
  personas:
  - id: cloud-admin
    name: Cloud Administrator
    description: Manages OCI infrastructure resources
    workflows:
    - infrastructure-management
  - id: data-engineer
    name: Data Engineer
    description: Manages databases and data pipelines
    workflows:
    - data-platform
  - id: app-developer
    name: Application Developer
    description: Builds cloud-native applications
    workflows:
    - cloud-native-development
  - id: security-engineer
    name: Security Engineer
    description: Manages security and compliance
    workflows:
