specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Oracle Cloud Infrastructure
providerId: oracle-cloud
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Cloud Computing
  - Rate Limiting
  - Oracle
notes: OCI publishes per-service limits and quotas in the Service Limits, Quotas, and Usage documentation
  rather than a single global table. Limits vary by tenancy, region, and service (Compute, Networking,
  Object Storage, IAM, etc.) and many can be raised by submitting a service-limit-increase request.
description: Oracle Cloud Infrastructure enforces service-specific limits and quotas per tenancy and per
  region (e.g. number of compute instances, VCNs, autonomous databases). API request throttling is per-service,
  per-region, and applied at the API endpoint; clients receive HTTP 429 with Retry-After. Many limits
  are soft and raisable via a service-limit-increase request from the OCI Console.
sources:
  - https://docs.oracle.com/en-us/iaas/Content/General/Concepts/servicelimits.htm
  - https://docs.oracle.com/en-us/iaas/Content/API/Concepts/usingapi.htm
headers:
  requestId: opc-request-id
  retryAfter: Retry-After
responseCodes:
  throttled: 429
  notAuthenticated: 401
  unavailable: 503
limits:
  - name: Service-specific quotas
    scope: tenancy/region/service
    metric: varies
    limit: see Service Limits, Quotas, and Usage docs
    notes: Each OCI service has its own limit set; many are raisable via support request.
  - name: API request throttling
    scope: tenancy/service
    metric: requests_per_second
    limit: varies per service endpoint
    notes: Throttling responses include 429 with Retry-After.
  - name: Eventual consistency
    scope: service
    metric: varies
    limit: see service docs
    notes: Some services (Object Storage list operations, IAM) are eventually consistent and require
      retry-on-stale.
policies:
  - name: Backoff
    description: Use exponential backoff with jitter on 429 / 503; SDKs ship default retry strategies.
  - name: Service-limit increase
    description: Request quota increases via the OCI Console (Governance > Limits, Quotas, and Usage)
      with justification.
  - name: Compartment quotas
    description: Use compartment policies to set per-compartment quota policies (separate from tenancy
      service limits).
  - name: Idempotency
    description: Many OCI APIs accept opc-retry-token to make POST/PUT operations idempotent for safe
      retries.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
